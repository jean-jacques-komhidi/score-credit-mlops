services:
  - type: web
    name: score-credit-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: score-credit-db
          property: connectionString

databases:
  - name: score-credit-db
    databaseName: score_credit_db
    plan: free
    region: frankfurt