name: CI/CD — Score Crédit MLOps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend API

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install fastapi uvicorn pydantic pandas numpy scikit-learn xgboost shap

      - name: Test imports
        run: |
          python -c "from fastapi import FastAPI; print('✅ FastAPI OK')"
          python -c "import xgboost; print('✅ XGBoost OK')"
          python -c "import pandas; print('✅ Pandas OK')"
          python -c "import shap; print('✅ SHAP OK')"

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend React

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  deploy-notify:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    name: Deploy Notification

    steps:
      - name: Success
        run: |
          echo "✅ CI/CD Pipeline terminé avec succès !"
          echo "✅ Backend : Tests OK"
          echo "✅ Frontend : Build OK"
          echo "🚀 Prêt pour le déploiement !"